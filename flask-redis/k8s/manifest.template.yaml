apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: ${NAMESPACE}
data:
  redis.conf: |
    tls-port 6379
    port 0
    tls-cert-file /tls/redis.crt
    tls-key-file /tls/redis.key
    tls-ca-cert-file /tls/redis-ca.crt
    tls-auth-clients yes
    loglevel notice

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: ${NAMESPACE}
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      imagePullSecrets:
        - name: ${IMAGE_PULL_SECRET_NAME}
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: Always
          command: ["redis-server", "/etc/redis/redis.conf"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-tls
              mountPath: /tls
              readOnly: true
            - name: redis-config
              mountPath: /etc/redis
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: redis-tls
          secret:
            secretName: redis-tls
        - name: redis-config
          configMap:
            name: redis-config

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: ${NAMESPACE}
  labels:
    app: redis
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-api
  namespace: ${NAMESPACE}
  labels:
    app: flask-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-api
  template:
    metadata:
      labels:
        app: flask-api
    spec:
      imagePullSecrets:
        - name: ${IMAGE_PULL_SECRET_NAME}
      containers:
        - name: flask-api
          image: ${IMAGE_NAME}
          imagePullPolicy: Always
          ports:
            - containerPort: 4996
          env:
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
          volumeMounts:
            - name: flask-tls
              mountPath: /tls
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /keys
              port: 4996
              scheme: HTTPS
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /keys
              port: 4996
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: flask-tls
          secret:
            secretName: flask-tls

---
apiVersion: v1
kind: Service
metadata:
  name: flask-api
  namespace: ${NAMESPACE}
  labels:
    app: flask-api
spec:
  selector:
    app: flask-api
  ports:
    - name: https
      port: 443
      targetPort: 4996
  type: ClusterIP
