apiVersion: v1
kind: Service
metadata:
  name: keyprovider
  namespace: trustee
spec:
  type: NodePort
  selector:
    app: keyprovider
  ports:
    - protocol: TCP
      port: 50000
      targetPort: 50000
      nodePort: 32000
---
apiVersion: v1
kind: Secret
metadata:
  name: kbs-admin-private-key
  namespace: trustee
type: Opaque
stringData:
  private.key: |
    -----BEGIN PRIVATE KEY-----
    MC4CAQAwBQYDK2VwBCIEIF43YXJ8BSG0MjCk4lcKFeM6bNpo+bQWA5yRgueljZmj
    -----END PRIVATE KEY-----
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keyprovider
  namespace: trustee
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keyprovider
  template:
    metadata:
      labels:
        app: keyprovider
    spec:
      containers:
        - name: keyprovider
          image: ghcr.io/confidential-containers/coco-keyprovider:v0.6.0
          command:
            - "coco_keyprovider"
            - "--socket"
            - "0.0.0.0:50000"
            - "--kbs"
            - "http://kbs.trustee.svc.cluster.local:30080"
            - "--auth-private-key"
            - "/etc/private-key/private.key"
          ports:
            - containerPort: 50000
          volumeMounts:
            - name: private-key
              mountPath: /etc/private-key
              readOnly: true
      volumes:
        - name: private-key
          secret:
            secretName: kbs-admin-private-key
