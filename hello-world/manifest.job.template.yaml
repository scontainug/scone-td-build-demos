apiVersion: batch/v1
kind: Job
metadata:
  name: hello-world
spec:
  template:
    metadata:
      labels:
        app: hello-world
    spec:
      restartPolicy: OnFailure
      containers:
        - name: hello-world
          image: ${IMAGE_NAME}
          imagePullPolicy: Always
      imagePullSecrets:
        - name: ${IMAGE_PULL_SECRET_NAME}
  backoffLimit: 4
